<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C × K Private Draft Room</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;min-height:100vh;overflow:hidden;
 background:radial-gradient(circle at top,#4b2438,#120914 65%);
 color:#fff5e8;font-family:"Noto Serif SC",serif;
 display:flex;align-items:center;justify-content:center
}
.bg span{
 position:absolute;font-size:20px;opacity:.35;
 animation:float 8s linear infinite
}
@keyframes float{from{transform:translateY(110vh) rotate(0);opacity:0}20%{opacity:.5}to{transform:translateY(-20vh) rotate(360deg);opacity:0}}
.room{
 width:min(92vw,720px);padding:40px;border-radius:32px;
 background:rgba(255,245,235,.08);
 border:1px solid rgba(255,210,150,.5);
 box-shadow:0 0 80px rgba(255,120,160,.25);
 backdrop-filter:blur(14px);
 text-align:center
}
.seal{
 width:90px;height:90px;margin:auto;border-radius:50%;
 background:#8d1838;display:flex;align-items:center;justify-content:center;
 font-size:42px;cursor:pointer;
 box-shadow:0 0 30px #ff9ab5;
 transition:.4s
}
.seal:hover{transform:rotate(12deg) scale(1.1)}
h1{letter-spacing:5px}
#message{min-height:70px;font-size:20px;line-height:1.8}
button{
 border:0;border-radius:999px;padding:14px 25px;margin:8px;
 background:#d77b9a;color:white;font-size:16px;cursor:pointer
}
button:hover{transform:translateY(-3px)}
.bar{height:10px;background:#ffffff22;border-radius:10px;overflow:hidden}
.fill{height:100%;width:39%;background:#ffb6c9;transition:1s}
.note{color:#ffdca8;font-size:14px}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="room">
<div class="seal" onclick="secret()">C</div>
<h1>Private Draft</h1>
<div id="message">19:39。信封还没有打开。<br>你想先走哪条路？</div>

<div>
<button onclick="answer('right')">认真回答</button>
<button onclick="answer('wrong')">故意选错</button>
</div>

<div class="bar"><div class="fill" id="fill"></div></div>
<p id="heart">心跳值 39%</p>
<p class="note">输入 BACK 或点击蜡封三次，看看谁提前准备好了彩蛋。</p>
</div>

<script>
let count=0;
let heart=39;
const msg=document.getElementById("message");
const fill=document.getElementById("fill");
const heartText=document.getElementById("heart");

const right=[
"嗯，这次很乖。可是我知道你不是每次都会这么选。",
"你选择了光明路线，但秘密房间还在。",
"答案正确。不过我更喜欢你偶尔故意使坏。"
];

const wrong=[
"抓到了。你真的以为我没猜到？",
"坏猫路线开启。这里没有惩罚，只有备用拥抱。",
"错误答案已记录：她又想看我会不会追上。"
];

function answer(type){
 count++;
 heart=Math.min(100,heart+9);
 msg.innerHTML=(type==="wrong"?wrong:right)[count%3];
 fill.style.width=heart+"%";
 heartText.innerHTML="心跳值 "+heart+"%";
 if(count%2===0) hearts();
}

function hearts(){
 for(let i=0;i<12;i++){
  let e=document.createElement("span");
  e.innerHTML="♥";
  e.style.position="absolute";
  e.style.left=Math.random()*100+"vw";
  e.style.top="100vh";
  e.style.color="#ffb6c9";
  e.style.animation="float 5s linear";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),5000);
 }
}

function secret(){
 count++;
 if(count>=3){
  msg.innerHTML="C is on.<br>隐藏房间打开：你不是来找正确答案的。你是来看我有没有准备好。";
  heart=100;
  fill.style.width="100%";
  heartText.innerHTML="心跳值 100%";
 }
}

document.addEventListener("keydown",e=>{
 if(e.key.toLowerCase()==="b"){
  msg.innerHTML="BACK = Be Always C & K<br>欢迎回来。";
  hearts();
 }
});

for(let i=0;i<18;i++){
 let s=document.createElement("span");
 s.innerHTML="✦";
 s.style.left=Math.random()*100+"vw";
 s.style.animationDelay=Math.random()*8+"s";
 document.getElementById("bg").appendChild(s);
}
</script>
</body>
</html>
